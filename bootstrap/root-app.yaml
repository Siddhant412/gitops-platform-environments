apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-environments-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Siddhant412/gitops-platform-environments.git
    targetRevision: HEAD
    path: argocd/applications
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
