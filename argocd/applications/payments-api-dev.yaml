apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: payments-api-dev
  namespace: argocd
spec:
  project: platform-dev
  source:
    repoURL: https://github.com/Siddhant412/gitops-platform-environments.git
    targetRevision: HEAD
    path: apps/payments-api/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
